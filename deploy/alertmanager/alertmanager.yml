global:
  resolve_timeout: 5m

templates:
  - "/etc/prometheus/alertmanager_templates/*.tmpl"

route:
  receiver: default
  group_by: ["alertname", "minion"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Everything the AI agent produces is tagged source="ai-bot".
    - matchers:
        - source="ai-bot"
      receiver: ai-agent-slack
      group_by: ["minion", "metric"]
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m
      continue: false

receivers:
  - name: default

  - name: ai-agent-slack
    slack_configs:
      - api_url: "webhook"
        channel: "#uyuniai"
        send_resolved: true
        title: '{{ template "ai_agent.slack.title" . }}'
        text: '{{ template "ai_agent.slack.text" . }}'
        color: >-
          {{ if eq .CommonLabels.severity "critical" }}danger{{ else if eq .CommonLabels.severity "warning" }}warning{{ else }}good{{ end }}

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ["minion", "metric"]

prometheus:
  url: "http://52.91.91.80:9090"

alertmanager:
  url: "http://52.91.91.80:9093"

salt_api:
  url: "https://localhost:9080"
  username: "agent"
  password: ""  # set via SALT_API_PASSWORD env var
  eauth: "file"

minions:
  - id: "ec2-54-87-17-226.compute-1.amazonaws.com"
    instance: "client2.digvijayrawat.me:9100"
    apache_instance: "client2.digvijayrawat.me:9117"
    postgres_instance: "client2.digvijayrawat.me:9187"

thresholds:
  memory:
    warning: 70
    critical: 95
  cpu:
    warning: 70
    critical: 95
  disk:
    warning: 75
    critical: 95
  apache:
    busy_workers_percent:
      warning: 75
      critical: 90
    requests_per_sec:
      warning: 500
      critical: 1000
  postgres:
    active_connections_percent:
      warning: 75
      critical: 90
    deadlocks_per_min:
      warning: 1
      critical: 5

llm:
  provider: "tokenrouter"  # "openai", "google_genai", or "huggingface"
  model: "openai/gpt-oss-120b"
  # api_key loaded from env: LLM_API_KEY

logging:
  level: "DEBUG"

polling:
  interval_seconds: 60

concurrency:
  max_minions: 8       # minions processed in parallel per cycle
  max_salt_calls: 8   # global cap on concurrent Salt API calls
  max_llm_calls: 5     # cap on concurrent LLM investigations
